services:
  - type: web
    name: obinna-victor-lendsqr-be-test
    runtime: docker
    plan: free
    healthCheckPath: /health
    autoDeployTrigger: commit
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3000
      - key: DATABASE_HOST
        sync: false
      - key: DATABASE_PORT
        sync: false
      - key: DATABASE_USER
        sync: false
      - key: DATABASE_PASSWORD
        sync: false
      - key: DATABASE_NAME
        sync: false
      - key: DATABASE_SSL
        value: true
      - key: DATABASE_SSL_REJECT_UNAUTHORIZED
        value: true
      - key: DATABASE_SSL_CA
        sync: false
      - key: ADJUTOR_BASE_URL
        value: https://adjutor.lendsqr.com/v2
      - key: ADJUTOR_API_KEY
        sync: false
